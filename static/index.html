<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Autopost RS - Dashboard</title>
    <!-- Tailwind CSS & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-slate-100 p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-4xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">
                AutoPost Dashboard
            </h1>
            <p id="blog-name" class="text-slate-400 text-lg">Loading config...</p>
        </header>

        <!-- Main Panel -->
        <div class="card glass-panel shadow-2xl">
            <div class="card-body">
                <h2 class="card-title text-2xl mb-4">Manual Post</h2>
                
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text text-slate-300">Select Target SNS</span>
                    </label>
                    <div id="sns-checkboxes" class="flex flex-wrap gap-4 mb-4 bg-slate-800/30 p-3 rounded-lg border border-slate-700/50">
                        <span class="loading loading-spinner loading-sm"></span>
                    </div>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text text-slate-300">Post Content</span>
                    </label>
                    <textarea id="post-text" class="textarea textarea-bordered h-32 bg-slate-800/50 text-white placeholder-slate-400" placeholder="Hello from Web UI!"></textarea>
                </div>

                <div class="form-control mt-4">
                    <label class="label">
                        <span class="label-text text-slate-300">Image URL (Optional)</span>
                    </label>
                    <input type="text" id="image-url" placeholder="https://example.com/image.jpg" class="input input-bordered w-full bg-slate-800/50 text-white placeholder-slate-400" />
                </div>

                <div class="form-control mt-4">
                    <label class="label">
                        <span class="label-text text-slate-300">Schedule</span>
                    </label>
                    <div class="flex flex-col md:flex-row gap-4 bg-slate-800/30 p-3 rounded-lg border border-slate-700/50">
                        <label class="label cursor-pointer justify-start gap-2 flex-1">
                            <input type="radio" name="schedule-type" value="now" checked class="radio radio-primary radio-sm" onclick="toggleCustomDate(false)" />
                            <span class="label-text text-slate-200">Post Now</span>
                        </label>
                        <label class="label cursor-pointer justify-start gap-2 flex-1">
                            <input type="radio" name="schedule-type" value="next" class="radio radio-primary radio-sm" onclick="toggleCustomDate(false)" />
                            <span class="label-text text-slate-200">Next Available Slot</span>
                        </label>
                        <label class="label cursor-pointer justify-start gap-2 flex-1">
                            <input type="radio" name="schedule-type" value="custom" class="radio radio-primary radio-sm" onclick="toggleCustomDate(true)" />
                            <span class="label-text text-slate-200">Custom Date</span>
                        </label>
                    </div>
                </div>

                <div class="form-control mt-4 hidden" id="custom-date-container">
                    <label class="label">
                        <span class="label-text text-slate-300">Scheduled At</span>
                    </label>
                    <input type="datetime-local" id="scheduled-at" class="input input-bordered w-full bg-slate-800/50 text-white" />
                </div>

                <div class="card-actions justify-end mt-6">
                    <button id="post-btn" class="btn btn-primary bg-gradient-to-r from-purple-500 to-pink-500 border-none text-white font-bold w-full md:w-auto px-8" onclick="submitPost()">
                        Post
                    </button>
                </div>
            </div>
        </div>

        <!-- Scheduled Posts Panel -->
        <div class="card glass-panel shadow-2xl">
            <div class="card-body">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="card-title text-2xl">Scheduled Posts</h2>
                    <div class="flex gap-2">
                        <button class="btn btn-sm btn-outline btn-accent" onclick="cleanupFinished()">Cleanup Posted</button>
                        <button class="btn btn-sm btn-outline btn-primary" onclick="loadSchedules()">Refresh</button>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="table w-full text-slate-200">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-700">
                                <th>Scheduled Time</th>
                                <th>SNS</th>
                                <th>Content</th>
                                <th>Status</th>
                                <th class="text-right flex-shrink-0 w-20">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="schedules-tbody">
                            <tr>
                                <td colspan="5" class="text-center text-slate-500 py-8">
                                    <span class="loading loading-spinner loading-md"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Result / Log Area -->
        <div class="card glass-panel shadow-xl mt-8">
            <div class="card-body">
                <h3 class="font-bold text-lg">Log</h3>
                <div id="log-area" class="bg-slate-950 rounded-lg p-4 h-48 overflow-y-auto font-mono text-sm text-green-400 space-y-2">
                    <div>> Ready.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast toast-top toast-end" id="toast-container"></div>

    <!-- Edit Modal -->
    <dialog id="edit-modal" class="modal">
        <div class="modal-box glass-panel bg-slate-900 border border-slate-700 text-slate-100">
            <h3 class="font-bold text-xl mb-4 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">Edit Scheduled Post</h3>
            <input type="hidden" id="edit-post-id" />
            
            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text text-slate-300">Content</span>
                </label>
                <textarea id="edit-post-text" class="textarea textarea-bordered h-28 bg-slate-800 text-white border-slate-700" placeholder="Post content"></textarea>
            </div>
            
            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text text-slate-300">Scheduled At</span>
                </label>
                <input type="datetime-local" id="edit-scheduled-at" class="input input-bordered bg-slate-800 text-white border-slate-700" />
            </div>
            
            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text text-slate-300">Target SNS</span>
                </label>
                <div id="edit-sns-checkboxes" class="flex flex-wrap gap-2 p-3 bg-slate-800/50 rounded-lg border border-slate-700/50">
                    <!-- Dynamic checkboxes -->
                </div>
            </div>
            
            <div class="form-control mb-6">
                <label class="label">
                    <span class="label-text text-slate-300">Status</span>
                </label>
                <select id="edit-status" class="select select-bordered bg-slate-800 text-white border-slate-700">
                    <option value="予約済み">予約済み</option>
                    <option value="投稿済み">投稿済み</option>
                    <option value="失敗">失敗</option>
                </select>
            </div>
            
            <div class="modal-action">
                <button class="btn btn-ghost text-slate-300 border-none hover:bg-slate-800" onclick="document.getElementById('edit-modal').close()">Cancel</button>
                <button class="btn btn-primary bg-gradient-to-r from-purple-500 to-pink-500 border-none text-white font-bold" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </dialog>

    <script>
        // 設定をロードしてヘッダーに表示
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                
                document.getElementById('blog-name').textContent = data.blog_name;
                
                const container = document.getElementById('sns-checkboxes');
                container.innerHTML = '';
                
                if (data.active_sns.length === 0) {
                    container.innerHTML = '<span class="text-slate-500 text-sm">No connected SNS found in config.yml</span>';
                    return;
                }
                
                data.active_sns.forEach(sns => {
                    const label = document.createElement('label');
                    label.className = 'label cursor-pointer justify-start gap-3 bg-slate-800/50 hover:bg-slate-700/50 p-2 rounded-lg border border-slate-700/50 transition-colors flex-1 min-w-[200px]';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'sns-target';
                    checkbox.value = sns;
                    checkbox.checked = true;
                    checkbox.className = 'checkbox checkbox-primary checkbox-sm';
                    
                    const span = document.createElement('span');
                    span.className = 'label-text text-slate-200 font-medium';
                    span.textContent = sns;
                    
                    label.appendChild(checkbox);
                    label.appendChild(span);
                    container.appendChild(label);
                });
            } catch (err) {
                console.error("Failed to load config", err);
                showToast("Failed to load config", "alert-error");
            }
        }

        function appendLog(message, isError = false) {
            const logArea = document.getElementById('log-area');
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            div.textContent = `[${time}] ${message}`;
            if (isError) {
                div.className = 'text-red-400';
            }
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function showToast(message, type = "alert-info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `alert ${type} text-white font-semibold`;
            toast.innerHTML = `<span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleCustomDate(show) {
            const container = document.getElementById('custom-date-container');
            if (show) {
                container.classList.remove('hidden');
                // デフォルトとして現在時刻の1時間後を設定
                const now = new Date();
                now.setHours(now.getHours() + 1);
                now.setSeconds(0, 0);
                // datetime-local フォーマット YYYY-MM-DDTHH:MM
                const offset = now.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(now - offset)).toISOString().slice(0, 16);
                document.getElementById('scheduled-at').value = localISOTime;
            } else {
                container.classList.add('hidden');
            }
        }

        async function submitPost() {
            const btn = document.getElementById('post-btn');
            const text = document.getElementById('post-text').value.trim();
            let imageUrl = document.getElementById('image-url').value.trim();
            
            const checkedTargets = Array.from(document.querySelectorAll('input[name="sns-target"]:checked')).map(el => el.value);
            const scheduleType = document.querySelector('input[name="schedule-type"]:checked').value;
            let scheduledAt = null;

            if (!text) {
                showToast("Please enter some text", "alert-warning");
                return;
            }

            if (checkedTargets.length === 0) {
                showToast("Please select at least one SNS target", "alert-warning");
                return;
            }

            if (scheduleType === "custom") {
                const dateVal = document.getElementById('scheduled-at').value;
                if (!dateVal) {
                    showToast("Please select a scheduled time", "alert-warning");
                    return;
                }
                scheduledAt = new Date(dateVal).toISOString();
            }

            if (imageUrl === "") {
                imageUrl = null;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            if (scheduleType === "now") {
                appendLog(`Sending post to ${checkedTargets.join(', ')}...`);
            } else {
                appendLog(`Scheduling post for ${checkedTargets.join(', ')} (${scheduleType === 'next' ? 'Next Slot' : scheduledAt})...`);
            }

            try {
                const res = await fetch('/api/post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text,
                        image_url: imageUrl,
                        targets: checkedTargets,
                        schedule_type: scheduleType,
                        scheduled_at: scheduledAt
                    })
                });

                const data = await res.json();
                
                if (data.success) {
                    const actionText = scheduleType === "now" ? "posted" : "scheduled";
                    showToast(`Successfully ${actionText}!`, "alert-success");
                    appendLog(`Successfully ${actionText} to all targets.`);
                    document.getElementById('post-text').value = '';
                    loadSchedules();
                } else {
                    showToast("Failed with some errors", "alert-warning");
                    appendLog("Operation failed. Check results:", true);
                    data.results.forEach((r, i) => {
                        if (!r.success) {
                            appendLog(`Target ${i}: ${r.error_message}`, true);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                showToast("Request failed", "alert-error");
                appendLog(`Error: ${err.message}`, true);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        let schedulesData = []; // 現在のスケジュールデータを保持

        async function loadSchedules() {
            const tbody = document.getElementById('schedules-tbody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8"><span class="loading loading-spinner loading-md"></span></td></tr>';
            
            try {
                const res = await fetch('/api/schedules');
                if (!res.ok) throw new Error("Failed to load schedules");
                schedulesData = await res.json();
                
                tbody.innerHTML = '';
                if (schedulesData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-slate-500 py-8">No scheduled posts found.</td></tr>';
                    return;
                }
                
                // 日時順にソート (昇順)
                schedulesData.sort((a, b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
                
                schedulesData.forEach(post => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-slate-800/50 hover:bg-slate-800/20';
                    
                    // 日時の整形
                    const dt = new Date(post.scheduled_at);
                    const dtStr = dt.toLocaleString('ja-JP', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit'
                    });
                    
                    // SNSバッジ
                    const snsBadges = post.target_sns.map(sns => 
                        `<span class="badge badge-outline badge-secondary text-xs mr-1">${sns}</span>`
                    ).join('');
                    
                    // ステータスバッジ
                    let statusClass = 'badge-info';
                    if (post.status === '投稿済み') statusClass = 'badge-success';
                    if (post.status === '失敗') statusClass = 'badge-error';
                    
                    const statusBadge = `<span class="badge ${statusClass} badge-sm font-semibold">${post.status}</span>`;
                    
                    // 本文プレビュー
                    const contentPreview = post.content.length > 50 
                        ? post.content.slice(0, 50) + '...' 
                        : post.content;
                    
                    // アクションボタン
                    const actions = `
                        <div class="flex justify-end gap-2">
                            <button class="btn btn-xs btn-circle btn-ghost text-sky-400 hover:bg-sky-500/20" onclick="editPost('${post.id}')" title="Edit">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                            </button>
                            <button class="btn btn-xs btn-circle btn-ghost text-red-400 hover:bg-red-500/20" onclick="deletePost('${post.id}')" title="Delete">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    `;
                    
                    tr.innerHTML = `
                        <td class="font-medium text-slate-300 text-sm whitespace-nowrap">${dtStr}</td>
                        <td><div class="flex flex-wrap gap-1">${snsBadges}</div></td>
                        <td class="max-w-[200px] truncate text-slate-300 text-sm" title="${post.content}">${contentPreview}</td>
                        <td>${statusBadge}</td>
                        <td>${actions}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-red-400 py-8">Failed to load scheduled posts.</td></tr>';
            }
        }

        async function deletePost(id) {
            if (!confirm("Are you sure you want to delete this scheduled post?")) return;
            try {
                const res = await fetch(`/api/schedules/${id}`, { method: 'DELETE' });
                if (res.status === 204) {
                    showToast("Successfully deleted schedule", "alert-success");
                    appendLog(`Deleted scheduled post: ${id}`);
                    loadSchedules();
                } else {
                    throw new Error(`Failed with status ${res.status}`);
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to delete schedule", "alert-error");
            }
        }

        function editPost(id) {
            const post = schedulesData.find(p => p.id === id);
            if (!post) return;
            
            document.getElementById('edit-post-id').value = post.id;
            document.getElementById('edit-post-text').value = post.content;
            document.getElementById('edit-status').value = post.status;
            
            // ISO-8601 時刻を YYYY-MM-DDTHH:MM に変換する (ローカルタイム基準)
            const dt = new Date(post.scheduled_at);
            const offset = dt.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(dt - offset)).toISOString().slice(0, 16);
            document.getElementById('edit-scheduled-at').value = localISOTime;
            
            // 対象 SNS チェックボックスの生成
            const container = document.getElementById('edit-sns-checkboxes');
            container.innerHTML = '';
            
            // 現在アクティブな全SNSを取得する
            const allSns = Array.from(document.querySelectorAll('input[name="sns-target"]')).map(el => el.value);
            allSns.forEach(sns => {
                const label = document.createElement('label');
                label.className = 'label cursor-pointer justify-start gap-2 bg-slate-700/30 hover:bg-slate-700/50 p-2 rounded-lg border border-slate-600/30 flex-1 min-w-[120px]';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.name = 'edit-sns-target';
                checkbox.value = sns;
                
                const snsName = sns.match(/\(([^)]+)\)/)?.[1] || sns;
                checkbox.checked = post.target_sns.includes(snsName);
                checkbox.className = 'checkbox checkbox-primary checkbox-sm';
                
                const span = document.createElement('span');
                span.className = 'label-text text-slate-200 text-xs font-semibold';
                span.textContent = sns;
                
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
            });
            
            document.getElementById('edit-modal').showModal();
        }

        async function saveEdit() {
            const id = document.getElementById('edit-post-id').value;
            const text = document.getElementById('edit-post-text').value.trim();
            const dateVal = document.getElementById('edit-scheduled-at').value;
            const status = document.getElementById('edit-status').value;
            
            const checkedTargets = Array.from(document.querySelectorAll('input[name="edit-sns-target"]:checked')).map(el => {
                const val = el.value;
                return val.match(/\(([^)]+)\)/)?.[1] || val;
            });
            
            if (!text) {
                showToast("Content cannot be empty", "alert-warning");
                return;
            }
            if (!dateVal) {
                showToast("Please select scheduled time", "alert-warning");
                return;
            }
            if (checkedTargets.length === 0) {
                showToast("Please select at least one SNS target", "alert-warning");
                return;
            }
            
            const scheduledAt = new Date(dateVal).toISOString();
            
            try {
                const res = await fetch(`/api/schedules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: text,
                        scheduled_at: scheduledAt,
                        target_sns: checkedTargets,
                        status: status,
                        media_files: null
                    })
                });
                
                if (res.ok) {
                    showToast("Successfully updated schedule", "alert-success");
                    appendLog(`Updated scheduled post: ${id}`);
                    document.getElementById('edit-modal').close();
                    loadSchedules();
                } else {
                    throw new Error(`Failed to update: ${res.status}`);
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to update schedule", "alert-error");
            }
        }

        async function cleanupFinished() {
            const toDelete = schedulesData.filter(p => p.status === '投稿済み');
            if (toDelete.length === 0) {
                showToast("No posted schedules to cleanup", "alert-info");
                return;
            }
            if (!confirm(`Are you sure you want to cleanup ${toDelete.length} posted schedules?`)) return;
            
            appendLog(`Starting cleanup of ${toDelete.length} posted schedules...`);
            let successCount = 0;
            
            for (const post of toDelete) {
                try {
                    const res = await fetch(`/api/schedules/${post.id}`, { method: 'DELETE' });
                    if (res.status === 204) {
                        successCount++;
                    }
                } catch (err) {
                    console.error("Cleanup failed for " + post.id, err);
                }
            }
            
            showToast(`Cleaned up ${successCount} schedules`, "alert-success");
            appendLog(`Cleanup finished: Removed ${successCount} schedules.`);
            loadSchedules();
        }

        // Initialize
        loadConfig();
        loadSchedules();
    </script>
</body>
</html>
