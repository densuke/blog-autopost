name: CI

# main への Pull Request と push で書式検査・静的解析・テスト・カバレッジ計測を行う。
# dependabot の PR は dependabot-automerge.yml 側でテストされるため、ここでは除外する。
#
# カバレッジの閾値は coverage-threshold.txt で管理する。閾値は引き下げないこと。
# テスト追加でカバレッジが上がったら、同じPR内で閾値も引き上げる(ラチェット方式)。
# 詳細は .kiro/specs/test-coverage-improvement/ を参照。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - name: ソースの取得
        uses: actions/checkout@v4

      - name: Rustツールチェインのセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: ビルドキャッシュ
        uses: Swatinem/rust-cache@v2

      - name: cargo-llvm-cov の導入
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 書式検査
        run: cargo fmt --all -- --check

      - name: 静的解析
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: テストとカバレッジ計測
        run: |
          set -x
          threshold=$(cat coverage-threshold.txt)
          echo "カバレッジ閾値: ${threshold}%"
          cargo llvm-cov --all-features --workspace \
            --fail-under-regions "${threshold}" \
            --summary-only | tee coverage-summary.txt

      - name: カバレッジサマリの出力
        if: always()
        run: |
          {
            echo "## カバレッジ計測結果"
            echo ""
            echo "閾値: $(cat coverage-threshold.txt)% (リージョン)"
            echo ""
            echo '```'
            cat coverage-summary.txt 2>/dev/null || echo "計測結果を取得できませんでした"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
