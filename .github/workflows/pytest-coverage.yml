name: CI — pytest + coverage

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            # - name: Set up Python
            #   uses: actions/setup-python@v4
            #   with:
            #       python-version: "3.13"

            - name: Install uv
              uses: astral-sh/setup-uv@v4

            - name: Install dependencies
              run: |
                  uv sync --extra dev
                  sudo apt-get update
                  sudo apt-get install -y ffmpeg
            - name: create example configuration
              run: |
                  cp -v config.yml.template config.yml

            - name: Run tests with coverage
              run: |
                  uv run coverage run -m pytest --maxfail=1 -q
                  uv run coverage xml -i -o coverage.xml
                  uv run coverage report -m

            - name: Upload coverage to GitHub Actions summary
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage.xml
