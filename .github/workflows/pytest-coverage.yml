name: CI — pytest + coverage (python)

# python ブランチ(旧Python版)の保守用CI。push/PRでpytestを実行する。
# dependabotのPRは専用の自動マージワークフロー側でテスト・マージするため除外。
on:
    push:
        branches: [python]
    pull_request:
        branches: [python]
    workflow_dispatch:

jobs:
    test:
        if: ${{ github.actor != 'dependabot[bot]' }}
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # - name: Set up Python
            #   uses: actions/setup-python@v4
            #   with:
            #       python-version: "3.13"

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Install dependencies
              run: |
                  uv sync --extra dev
                  if ! command -v ffmpeg &> /dev/null; then
                    sudo apt-get update
                    sudo apt-get install -y ffmpeg
                  fi
            - name: create example configuration
              run: |
                  cp -v config.yml.template config.yml

            - name: Run tests with coverage
              run: |
                  uv run coverage run -m pytest --maxfail=1 -q
                  uv run coverage xml -i -o coverage.xml
                  uv run coverage report -m

            - name: Upload coverage to GitHub Actions summary
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: coverage.xml
